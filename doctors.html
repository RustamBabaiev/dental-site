<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="mt">Врачи | СтомаПрайм</title>
  <meta name="description" content="Опытные врачи-стоматологи клиники СтомаПрайм в Москве.">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
<style>
.doc-full {
  display:grid; grid-template-columns:300px 1fr; gap:0;
  background:#fff; border-radius:20px; overflow:hidden;
  border:1px solid #edf1f7; box-shadow:0 4px 20px rgba(12,22,40,0.07);
  transition:box-shadow .3s, transform .3s cubic-bezier(.34,1.56,.64,1);
}
.doc-full:hover { box-shadow:0 12px 40px rgba(12,22,40,0.11); transform:translateY(-3px); }
@media(max-width:700px){.doc-full{grid-template-columns:1fr;}}
.doc-full-photo { width:100%; height:100%; min-height:320px; object-fit:cover; object-position:top center; display:block; }
@media(max-width:700px){.doc-full-photo{height:260px;}}
.doc-full-body { padding:36px 40px; display:flex; flex-direction:column; gap:14px; }
@media(max-width:700px){.doc-full-body{padding:24px;}}
.doc-full-name { font-family:'Outfit',sans-serif; font-size:1.5rem; font-weight:800; color:#0c1628; letter-spacing:-0.035em; }
.doc-full-role { font-size:.88rem; color:#2563eb; font-weight:600; letter-spacing:.01em; }
.doc-full-exp  { display:inline-flex; align-items:center; gap:8px; font-size:.82rem; background:#eff6ff; color:#1d4ed8; padding:7px 15px; border-radius:99px; font-weight:700; width:fit-content; border:1px solid #bfdbfe; }
.doc-full-edu  { font-size:.88rem; color:#6b7fa0; display:flex; align-items:flex-start; gap:8px; line-height:1.5; }
.doc-full-spec-wrap { display:flex; gap:7px; flex-wrap:wrap; }
.doc-full-spec { font-size:.75rem; font-weight:700; background:#f0fdfa; color:#0d9488; padding:5px 12px; border-radius:99px; border:1px solid #ccfbf1; }
.doc-full-actions { display:flex; gap:10px; margin-top:6px; flex-wrap:wrap; }

.cert-strip {
  background:linear-gradient(140deg,#1e3a8a 0%,#2563eb 50%,#0ea5e9 100%);
  border-radius:24px; padding:56px 48px; color:#fff; text-align:center;
  position:relative; overflow:hidden;
}
.cert-strip::before{content:'';position:absolute;right:-60px;top:-60px;width:280px;height:280px;border-radius:50%;border:1px solid rgba(255,255,255,0.09);pointer-events:none;}
.cert-strip-h { font-family:'Outfit',sans-serif; font-size:clamp(1.5rem,3vw,2rem); font-weight:800; margin-bottom:12px; letter-spacing:-0.035em; }
.cert-strip-p { opacity:.85; max-width:480px; margin:0 auto 36px; font-size:.95rem; line-height:1.72; }
.cert-nums { display:flex; justify-content:center; gap:48px; flex-wrap:wrap; }
.cert-num-item { text-align:center; }
.cert-num-item strong { display:block; font-family:'Outfit',sans-serif; font-size:2.2rem; font-weight:900; letter-spacing:-0.04em; margin-bottom:4px; }
.cert-num-item span  { font-size:.78rem; opacity:.72; font-weight:500; }
</style>
</head>
<body>
<header class="site-header" id="site-header"></header>
<main>

<section class="page-hero" aria-label="Врачи">
  <div class="container">
    <nav class="breadcrumb"><a href="index.html">Главная</a><span class="breadcrumb-sep">›</span><span class="breadcrumb-current">Врачи</span></nav>
    <div class="label reveal">Наша команда</div>
    <h1 class="page-hero-h1 reveal d1">Врачи клиники</h1>
    <p class="page-hero-sub reveal d2">Опытные специалисты с постоянным повышением квалификации. Каждый врач — эксперт в своей области.</p>
  </div>
</section>

<section class="section">
  <div class="container">
    <div style="display:flex;flex-direction:column;gap:28px" id="doc-list"></div>
  </div>
</section>

<section class="section section-bg">
  <div class="container">
    <div class="cert-strip reveal-s" id="cert"></div>
  </div>
</section>

<section class="section" id="form-section">
  <div class="container" style="max-width:600px">
    <div class="sec-head center reveal">
      <div class="label">Запись онлайн</div>
      <h2 class="h2">Запишитесь к врачу</h2>
      <div class="accent-line c w"></div>
    </div>
    <div style="background:#fff;border-radius:22px;padding:40px;box-shadow:0 8px 40px rgba(12,22,40,0.10);border:1px solid #edf1f7" class="reveal" id="form-box"></div>
  </div>
</section>

</main>
<footer class="site-footer" id="site-footer"></footer>
<script src="config.js"></script><script src="shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  const d=SITE_DATA;
  document.getElementById('mt').textContent=`Врачи | ${d.general.clinicName}`;

  document.getElementById('doc-list').innerHTML=d.doctors.map((dc,i)=>`
    <div class="doc-full reveal d${i+1}">
      <img src="${dc.photo}" alt="${dc.alt}" class="doc-full-photo" loading="lazy">
      <div class="doc-full-body">
        <div class="doc-full-name">${dc.name}</div>
        <div class="doc-full-role">${dc.role}</div>
        <div class="doc-full-exp">🎓 Опыт работы: ${dc.experience}</div>
        <div class="doc-full-edu">📚 ${dc.education}</div>
        <div>
          <div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#8a9ab5;margin-bottom:9px">Специализации</div>
          <div class="doc-full-spec-wrap">${dc.specializations.map(sp=>`<span class="doc-full-spec">${sp}</span>`).join('')}</div>
        </div>
        <div class="doc-full-actions">
          <a href="#form-section" class="btn btn-primary btn-lg">Записаться</a>
          <a href="${UTILS.whatsappLink()}" class="btn btn-wa btn-lg" target="_blank" rel="noopener">💬 WhatsApp</a>
        </div>
      </div>
    </div>`).join('');

  document.getElementById('cert').innerHTML=`
    <div class="cert-strip-h">Сертифицированные специалисты</div>
    <p class="cert-strip-p">Все врачи имеют действующие сертификаты и регулярно проходят обучение на профильных конференциях</p>
    <div class="cert-nums">
      <div class="cert-num-item"><strong data-counter data-to="${d.general.doctorsCount}" data-sfx="">0</strong><span>специалиста</span></div>
      <div class="cert-num-item"><strong data-counter data-to="15000" data-sfx="+">0</strong><span>пациентов</span></div>
      <div class="cert-num-item"><strong data-counter data-to="${new Date().getFullYear()-d.general.foundedYear}" data-sfx="+">0</strong><span>лет работы</span></div>
      <div class="cert-num-item"><strong>${d.general.guaranteeYears} лет</strong><span>гарантия</span></div>
    </div>`;

  document.getElementById('form-box').innerHTML=getBookingFormHTML(false);
  initPage('doctors');
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="mt">Услуга | СтомаПрайм</title>
  <meta name="description" id="md" content="">
  <link rel="canonical" id="can" href="">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared.css">
</head>
<body>
<header class="site-header" id="site-header"></header>
<main>

<section class="svc-hero">
  <div class="container">
    <nav class="breadcrumb">
      <a href="../index.html">Главная</a><span class="breadcrumb-sep">›</span>
      <a href="../index.html#services">Услуги</a><span class="breadcrumb-sep">›</span>
      <span class="breadcrumb-current" id="bc"></span>
    </nav>
    <div class="svc-hero-inner">
      <div>
        <div class="label" id="hero-label"></div>
        <h1 class="svc-hero-h1" id="hero-h1"></h1>
        <p class="svc-hero-p" id="hero-desc"></p>
        <div class="svc-hero-btns">
          <a href="#svc-form" class="btn btn-primary btn-lg">Записаться на консультацию</a>
          <a href="#" class="btn btn-wa btn-lg" id="hero-wa" target="_blank" rel="noopener">💬 WhatsApp</a>
        </div>
      </div>
      <div><img id="hero-img" src="" alt="" class="svc-hero-img" loading="eager"></div>
    </div>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="svc-layout">
      <div>
        <div class="sec-head reveal">
          <div class="label">Наши преимущества</div>
          <h2 class="h2" id="ben-title">Почему выбирают нас</h2>
          <div class="accent-line w"></div>
        </div>
        <div class="ben-list" id="ben-list"></div>

        <div class="sec-head reveal" style="margin-top:64px">
          <div class="label">Процесс лечения</div>
          <h2 class="h2">Этапы приёма</h2>
          <div class="accent-line w"></div>
        </div>
        <div class="steps-g" id="steps"></div>

        <div class="sec-head reveal" style="margin-top:64px">
          <div class="label">Вопросы и ответы</div>
          <h2 class="h2">Часто спрашивают</h2>
          <div class="accent-line w"></div>
        </div>
        <div id="faq"></div>
      </div>

      <div class="svc-sticky">
        <div class="side-card" id="svc-form">
          <div class="side-card-head"><h3>Записаться на приём</h3><p>Ответим в течение 15 минут</p></div>
          <div class="side-card-body" id="side-form"></div>
        </div>
        <div class="side-price" id="side-price"></div>
        <div style="background:#fff;border-radius:var(--r);border:1px solid var(--border-light);overflow:hidden">
          <div style="padding:13px 18px;border-bottom:1px solid var(--border-faint);font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-light)">Другие услуги</div>
          <div style="padding:10px" class="other-links" id="other"></div>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="section section-bg">
  <div class="container">
    <div class="sec-head center reveal">
      <div class="label">Специалисты</div>
      <h2 class="h2">Врачи по этой услуге</h2>
      <div class="accent-line c w"></div>
    </div>
    <div class="g4" id="doc-row"></div>
    <div style="text-align:center;margin-top:36px" class="reveal">
      <a href="../doctors.html" class="btn btn-outline btn-lg">Все врачи →</a>
    </div>
  </div>
</section>

</main>
<footer class="site-footer" id="site-footer"></footer>
<script src="../config.js"></script>
<script src="../shared.js"></script>
<script>
var SVC_STEPS = {
  default:[
    {n:'1',t:'Консультация',d:'Осмотр, рентген, составление плана лечения'},
    {n:'2',t:'Анестезия',   d:'Безболезненное обезболивание современными препаратами'},
    {n:'3',t:'Процедура',   d:'Лечение по согласованному плану'},
    {n:'4',t:'Контроль',    d:'Рекомендации и осмотр через месяц'},
  ],
  implantation:[
    {n:'1',t:'КТ и план',  d:'Компьютерная томография, 3D-планирование'},
    {n:'2',t:'Установка',  d:'Операция под анестезией, 40–60 минут'},
    {n:'3',t:'Заживление', d:'3–6 месяцев для надёжного приживления'},
    {n:'4',t:'Коронка',    d:'Изготовление и фиксация коронки'},
  ],
  braces:[
    {n:'1',t:'Консультация',d:'Диагностика прикуса, слепки, фото'},
    {n:'2',t:'Установка',   d:'Фиксация брекетов, около 2 часов'},
    {n:'3',t:'Коррекция',   d:'Плановые визиты каждые 4–6 недель'},
    {n:'4',t:'Ретенция',    d:'Ретейнеры после снятия брекетов'},
  ],
};
var SVC_FAQ = {
  default:[
    {q:'Больно ли делать процедуру?',a:'Нет. Применяем современные анестетики — полная безболезненность гарантирована.'},
    {q:'Сколько занимает лечение?',  a:'Большинство процедур — один визит. Сложные случаи — несколько посещений.'},
    {q:'Есть ли гарантия?',          a:'Да. Даём письменную гарантию на все виды работ.'},
    {q:'Сколько это стоит?',         a:'Зависит от объёма и сложности. Точную цену называем после бесплатного осмотра.'},
  ],
  implantation:[
    {q:'Больно ли делать имплантацию?',a:'Нет. Операция под местной анестезией. После — небольшой дискомфорт 2–3 дня.'},
    {q:'Сколько служит имплант?',      a:'При правильном уходе — пожизненно. Гарантия приживаемости 5 лет.'},
    {q:'Можно ли сразу после удаления?',a:'Да, это называется немедленная имплантация. Применяется при определённых условиях.'},
    {q:'Какие импланты используете?',  a:'Nobel Biocare, Straumann, Osstem — только проверенные бренды с гарантией.'},
  ],
};
var SVC_CAT = {
  implantation:'Имплантация', braces:'Ортодонтия',
  cleaning:'Гигиена и профилактика', whitening:'Гигиена и профилактика',
  caries:'Терапия', prosthetics:'Терапия', children:'Терапия', surgery:'Хирургия',
};

document.addEventListener('DOMContentLoaded', function() {
  var d    = SITE_DATA;
  var file = location.pathname.split('/').pop().replace('.html','');
  var svc  = null;
  for (var i=0; i<d.services.length; i++) { if (d.services[i].id===file){svc=d.services[i];break;} }
  if (!svc) svc = d.services[0];

  document.getElementById('mt').textContent  = svc.seoTitle;
  document.getElementById('md').content      = svc.seoDesc;
  document.getElementById('can').href        = svc.file;
  document.getElementById('bc').textContent  = svc.title;
  document.getElementById('hero-label').textContent = svc.title;
  document.getElementById('hero-h1').textContent    = svc.h1;
  document.getElementById('hero-desc').textContent  = svc.description;
  document.getElementById('hero-img').src    = svc.image;
  document.getElementById('hero-img').alt    = svc.h1;
  document.getElementById('hero-wa').href    = UTILS.whatsappLink();
  document.getElementById('ben-title').textContent = 'Преимущества — ' + svc.title.toLowerCase();

  document.getElementById('ben-list').innerHTML = svc.benefits.map(function(b,i){
    return '<div class="ben-item reveal d'+(i+1)+'">' +
      '<div class="ben-n">'+(i+1)+'</div>' +
      '<div class="ben-txt"><strong>'+b+'</strong></div></div>';
  }).join('');

  var steps = SVC_STEPS[svc.id] || SVC_STEPS.default;
  document.getElementById('steps').innerHTML = steps.map(function(s,i){
    return '<div class="step-card reveal d'+(i+1)+'">' +
      '<div class="step-n">'+s.n+'</div>' +
      '<div class="step-title">'+s.t+'</div>' +
      '<div class="step-desc">'+s.d+'</div></div>';
  }).join('');

  var faqs = SVC_FAQ[svc.id] || SVC_FAQ.default;
  document.getElementById('faq').innerHTML = faqs.map(function(f,i){
    return '<div class="faq-item reveal">' +
      '<div class="faq-q" onclick="toggleFaq('+i+')">'+f.q+'<span class="faq-arr" id="fa'+i+'">▼</span></div>' +
      '<div class="faq-a" id="fb'+i+'">'+f.a+'</div></div>';
  }).join('');

  document.getElementById('side-form').innerHTML =
    '<form id="svc-form-el" novalidate>' +
      '<div class="form-group"><input name="name" type="text" class="form-input" placeholder="Ваше имя" required autocomplete="name"></div>' +
      '<div class="form-group"><input name="phone" type="tel" class="form-input" placeholder="+7 (___) ___-__-__" required autocomplete="tel"></div>' +
      '<input type="hidden" name="service" value="'+svc.title+'">' +
      '<button type="submit" class="btn btn-primary" style="width:100%">Записаться</button>' +
      '<div style="display:flex;gap:8px;margin-top:9px">' +
        '<a href="'+UTILS.whatsappLink()+'" class="btn btn-wa btn-sm" style="flex:1;justify-content:center" target="_blank" rel="noopener">💬 WA</a>' +
        '<a href="'+d.contacts.telegramLink+'" class="btn btn-tg btn-sm" style="flex:1;justify-content:center" target="_blank" rel="noopener">✈️ TG</a>' +
      '</div></form>';

  var svcFormEl = document.getElementById('svc-form-el');
  if (svcFormEl) svcFormEl.addEventListener('submit', function(e){ handleFormSubmit(e, svcFormEl); });

  var catName = SVC_CAT[svc.id] || 'Терапия';
  var cat = null;
  for (var j=0; j<d.prices.length; j++) { if(d.prices[j].category===catName){cat=d.prices[j];break;} }
  if (cat) {
    document.getElementById('side-price').innerHTML =
      '<div class="side-price-head">'+cat.category+' — цены</div>' +
      cat.items.slice(0,4).map(function(it){
        return '<div class="side-prow"><span class="side-psvc">'+it.service+'</span><span class="side-pval">'+it.price+'</span></div>';
      }).join('') +
      '<div style="padding:12px 18px"><a href="../prices.html" class="btn btn-outline btn-sm" style="width:100%;justify-content:center">Полный прайс →</a></div>';
  }

  document.getElementById('other').innerHTML = d.services.filter(function(s){return s.id!==svc.id}).slice(0,5).map(function(s){
    return '<a href="'+s.file+'" class="other-link"><span>'+s.icon+'</span>'+s.title+'<span class="other-link-arrow">›</span></a>';
  }).join('');

  document.getElementById('doc-row').innerHTML = d.doctors.map(function(dc,i){
    return '<div class="doctor-card reveal d'+(i+1)+'">' +
      '<div class="doc-photo-wrap"><img src="'+dc.photo+'" alt="'+dc.alt+'" class="doctor-photo" loading="lazy"></div>' +
      '<div class="doctor-info">' +
        '<div class="doctor-name">'+dc.name+'</div>' +
        '<div class="doctor-role">'+dc.role+'</div>' +
        '<div class="doctor-exp">🎓 Опыт: '+dc.experience+'</div>' +
        '<div class="doctor-specs">'+dc.specializations.map(function(sp){return '<span class="doctor-spec">'+sp+'</span>';}).join('')+'</div>' +
      '</div></div>';
  }).join('');

  initPage('services');
});

function toggleFaq(i) {
  var a = document.getElementById('fb'+i);
  var t = document.getElementById('fa'+i);
  if(a) a.classList.toggle('open');
  if(t) t.classList.toggle('open');
}
</script>
</body>
</html>
